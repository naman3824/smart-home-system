name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 169424082626.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: smart-home-system

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build, tag, and push Docker images
        run: |
          # 1. Build and push the primary frontend app dashboard
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest -f Dockerfile .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          
          # 2. Build and push the climate-control microservice image (Saves EC2 resources!)
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-latest -f climate-control/Dockerfile .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:api-latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smart-home-system

            # Sync configuration modifications, static directories, and scripts
            git pull origin main

            # Authenticate internal Docker host using EC2 IAM instance identity role
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Export orchestration contexts for tag evaluation inside docker-compose.yml
            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}
            export FACE_DATA_HOST_PATH=/mnt/face-data

            # Guarantee core deployment dependency frameworks are available
            if ! docker compose version > /dev/null 2>&1; then
              sudo apt-get install -y docker-compose-plugin
            fi

            # Proactively pull down both pre-compiled service dependencies from ECR
            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
            docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY}:api-latest

            # Cleanly teardown legacy running instances and clear execution layers
            docker compose down || true

            # Boot up the environment with zero local code building required
            docker compose up -d