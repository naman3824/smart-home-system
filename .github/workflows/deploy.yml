name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 169424082626.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: smart-home-system

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build, tag, and push image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smart-home-system

            # Login to ECR on the EC2 instance
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Export ECR_REGISTRY so docker compose can interpolate ${ECR_REGISTRY} in the image field
            export ECR_REGISTRY=${{ env.ECR_REGISTRY }}

            # Ensure docker compose plugin is available
            if ! docker compose version > /dev/null 2>&1; then
              sudo apt-get install -y docker-compose-plugin
            fi

            # Pull the pre-built smart-home image from ECR
            docker pull ${ECR_REGISTRY}/smart-home-system:latest

            # Stop and remove both old containers cleanly
            docker compose down || true

            # Rebuild api-server from source on EC2, start both services
            docker compose up -d --build
