<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enroll Faces — Smart Home</title>
  <style>
    :root {
      --bg: #0d0f18;
      --surface: #161928;
      --surface2: #1e2236;
      --border: #2a2f46;
      --accent: #6c8bef;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #a5b8ff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .subtitle {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 24px
    }

    .warning-banner {
      background: rgba(245, 158, 11, .1);
      border: 1px solid rgba(245, 158, 11, .35);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--orange);
      line-height: 1.6
    }

    .warning-banner b {
      color: #fbbf24
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px
    }

    .member-section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border)
    }

    .member-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0
    }

    .member-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px
    }

    .member-name .badge {
      font-size: 10px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 8px
    }

    input[type=file] {
      font-size: 12px;
      color: var(--text2)
    }

    input[type=file]::file-selector-button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 10px;
      transition: all .15s
    }

    input[type=file]::file-selector-button:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s
    }

    .btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-1px)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .btn-primary:hover {
      background: #5a7de6
    }

    .btn-green {
      background: var(--green);
      border-color: var(--green);
      color: #fff
    }

    .btn-green:hover {
      background: #16a34a
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap
    }

    .progress {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.8;
      white-space: pre-line
    }

    .progress .done {
      color: var(--green)
    }

    .progress .skip {
      color: var(--orange)
    }

    .progress .active {
      color: var(--accent);
      font-weight: 600
    }

    #output {
      margin-top: 16px;
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text2);
      max-height: 200px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap
    }

    .file-count {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px
    }

    /* Click-to-add photo slots (one row for the logged-in member) */
    .photo-slots {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px
    }

    .slot {
      position: relative;
      width: 84px;
      height: 84px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: all .15s
    }

    .slot:hover {
      border-color: var(--accent);
      background: var(--surface)
    }

    .slot .slot-plus {
      font-size: 30px;
      font-weight: 300;
      color: var(--text3);
      line-height: 1
    }

    .slot:hover .slot-plus {
      color: var(--accent)
    }

    .slot .slot-thumb {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .slot .slot-remove {
      display: none;
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      align-items: center;
      justify-content: center
    }

    .slot.filled {
      border-style: solid;
      border-color: var(--accent)
    }

    .slot.filled .slot-plus {
      display: none
    }

    .slot.filled .slot-thumb {
      display: block
    }

    .slot.filled .slot-remove {
      display: flex
    }
  </style>
</head>

<body>

  <h1>🔐 Enroll Faces</h1>
  <div class="subtitle">Standalone offline tool — generates embeddings for the Smart Home dashboard</div>

  <div class="warning-banner">
    <b>⚠ Privacy notice:</b> Photos <b>never leave your browser</b>. Face-api.js runs entirely client-side.
    Only download and transfer <code>embeddings</code> — <b>never the photos themselves</b>.
  </div>

  <div class="card">
    <div class="card-title">📷 Add photos of your face</div>
    <div id="memberInputs"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="generateBtn" onclick="generateEmbeddings()" disabled>🧠 Generate
      Embeddings</button>
  </div>

  <div class="progress" id="progressEl"></div>
  <pre id="output"></pre>

  <script>
    // ─── Self-service enrollment ─────────────────────────────────────────
    // A logged-in member may enroll ONLY their own face. The member identity
    // comes from the dashboard session (/api/auth/me) — it is never chosen in
    // the UI — and the server stores the result under that same session
    // identity, so nobody can add or overwrite another member's face data.
    const MAX_PHOTOS = 5;
    let selfName = null;                          // logged-in member's display name
    const slotFiles = new Array(MAX_PHOTOS).fill(null);

    // ─── CDN URLs — copied exactly from index.html (lines 3090-3099) ────
    const FACE_API_SCRIPT_URLS = [
      'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js',
      'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/dist/face-api.min.js',
      'https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js'
    ];
    const FACE_API_WEIGHTS_URLS = [
      'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights',
      'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights',
      'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights'
    ];

    let modelsLoaded = false;

    // ─── Identify the logged-in member, then show their photo slots ──────
    async function init() {
      const container = document.getElementById('memberInputs');
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (!r.ok) throw new Error('unauthenticated');
        const me = await r.json();
        selfName = me.display_name;
      } catch (e) {
        container.innerHTML =
          '<div class="member-name">Not signed in</div>' +
          '<div class="file-count">Open this tool from your dashboard while signed in — you can only register your own face here.</div>';
        document.getElementById('generateBtn').disabled = true;
        return;
      }
      renderSlots();
    }

    // ─── Render up to MAX_PHOTOS click-to-add slots for this member ───────
    function renderSlots() {
      const container = document.getElementById('memberInputs');
      let slots = '';
      for (let i = 0; i < MAX_PHOTOS; i++) {
        slots += `
      <div class="slot" id="slot-${i}" onclick="pickSlot(${i})" title="Add photo ${i + 1}">
        <input type="file" id="slot-file-${i}" accept=".jpg,.jpeg,.png" hidden onchange="onSlotFile(${i})"/>
        <span class="slot-plus">+</span>
        <img class="slot-thumb" id="slot-thumb-${i}" alt=""/>
        <button class="slot-remove" title="Remove" onclick="removeSlot(${i}, event)">×</button>
      </div>`;
      }
      container.innerHTML = `
    <div class="member-section">
      <div class="member-name">${selfName} <span class="badge">Add 1–5 photos of your face</span></div>
      <div class="photo-slots">${slots}</div>
    </div>`;
      updateSlotStates();
    }

    function pickSlot(i) { document.getElementById('slot-file-' + i).click(); }

    function onSlotFile(i) {
      const f = document.getElementById('slot-file-' + i).files[0];
      if (!f) return;
      slotFiles[i] = f;
      const thumb = document.getElementById('slot-thumb-' + i);
      if (thumb.dataset.url) URL.revokeObjectURL(thumb.dataset.url);
      const url = URL.createObjectURL(f);
      thumb.src = url; thumb.dataset.url = url;
      updateSlotStates();
    }

    function removeSlot(i, ev) {
      ev.stopPropagation();
      slotFiles[i] = null;
      document.getElementById('slot-file-' + i).value = '';
      const thumb = document.getElementById('slot-thumb-' + i);
      if (thumb.dataset.url) { URL.revokeObjectURL(thumb.dataset.url); delete thumb.dataset.url; }
      thumb.removeAttribute('src');
      updateSlotStates();
    }

    function updateSlotStates() {
      for (let i = 0; i < MAX_PHOTOS; i++) {
        const slot = document.getElementById('slot-' + i);
        if (slot) slot.classList.toggle('filled', !!slotFiles[i]);
      }
      document.getElementById('generateBtn').disabled = !slotFiles.some(Boolean);
    }

    // ─── Load face-api.js library ────────────────────────────────────────
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src; s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Failed to load ' + src));
        document.head.appendChild(s);
      });
    }

    async function loadFaceApiLibrary() {
      if (typeof faceapi !== 'undefined') return true;
      for (const url of FACE_API_SCRIPT_URLS) {
        try { await loadScript(url); if (typeof faceapi !== 'undefined') return true; }
        catch (e) { console.warn(e.message); }
      }
      return false;
    }

    async function loadModelsFrom(base) {
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(base),
        faceapi.nets.faceLandmark68Net.loadFromUri(base),
        faceapi.nets.faceRecognitionNet.loadFromUri(base)
      ]);
    }

    async function ensureModels() {
      if (modelsLoaded) return true;
      log('Loading face-api.js library…');
      const libOk = await loadFaceApiLibrary();
      if (!libOk) { log('ERROR: Could not load face-api.js from any CDN.'); return false; }
      log('Library loaded ✓');

      for (const base of FACE_API_WEIGHTS_URLS) {
        try {
          log('Loading model weights…');
          await loadModelsFrom(base);
          modelsLoaded = true;
          log('Models loaded ✓ (tinyFaceDetector, faceLandmark68Net, faceRecognitionNet)');
          return true;
        } catch (e) { console.warn('Weights failed from ' + base, e.message); }
      }
      log('ERROR: Could not load model weights from any source.');
      return false;
    }

    // ─── Read a File as an HTMLImageElement ───────────────────────────────
    function readFileAsImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('Failed to decode image: ' + file.name));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error('Failed to read file: ' + file.name));
        reader.readAsDataURL(file);
      });
    }

    // ─── Logging ─────────────────────────────────────────────────────────
    function log(msg) {
      const el = document.getElementById('output');
      el.style.display = 'block';
      el.textContent += msg + '\n';
      el.scrollTop = el.scrollHeight;
    }

    function setProgress(html) {
      document.getElementById('progressEl').innerHTML = html;
    }

    // ─── Main: Generate Embeddings ───────────────────────────────────────
    async function generateEmbeddings() {
      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      document.getElementById('output').textContent = '';

      const ok = await ensureModels();
      if (!ok) { btn.disabled = false; return; }

      const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });
      const files = slotFiles.filter(Boolean).slice(0, MAX_PHOTOS);

      setProgress(`<span class="active">⏳ Processing ${selfName} (${files.length} photo${files.length > 1 ? 's' : ''})…</span>`);
      log(`\n── ${selfName} ──`);

      const descriptors = [];
      for (const file of files) {
        try {
          const img = await readFileAsImage(file);
          const det = await faceapi.detectSingleFace(img, options)
            .withFaceLandmarks().withFaceDescriptor();
          if (det) {
            descriptors.push(Array.from(det.descriptor));  // Float32Array → plain array
            log(`  ✓ ${file.name} — face found`);
          } else {
            log(`  ⚠ ${file.name} — no face detected, skipped`);
          }
        } catch (e) {
          log(`  ✗ ${file.name} — error: ${e.message}`);
        }
      }

      if (descriptors.length > 0) {
        setProgress(`<span class="done">✅ ${selfName} — ${descriptors.length}/${files.length} descriptors</span>`);
        log(`\nDone! ${descriptors.length} descriptor(s) captured for ${selfName}.`);
        // The server ignores this name and uses the session identity, but we
        // send it for clarity; a member can only ever write their own entry.
        await saveEmbeddings([{ name: selfName, descriptors }]);
      } else {
        setProgress(`<span class="skip">⚠ No face detected in your photo(s). Please try clearer, front-facing photos.</span>`);
        log('\nNo faces could be enrolled. Please check your photos and try again.');
      }
      btn.disabled = false;
    }

    // ─── Save embeddings to the server ───────────────────────────────────
    // Writes directly to the dashboard backend (POST /api/face-embeddings),
    // which persists them to face-data/embeddings.json. Same-origin request,
    // so the owner's session cookie is sent automatically.
    async function saveEmbeddings(results) {
      log('\nRegistering face(s) on the server…');
      try {
        const resp = await fetch('/api/face-embeddings', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ embeddings: results })
        });
        if (resp.ok) {
          setProgress(document.getElementById('progressEl').innerHTML +
            '<br><span class="done">✅ Face registered successfully</span>');
          log('Face registered successfully');
        } else {
          const reason = resp.status === 401 ? 'not signed in — open this tool from the dashboard while logged in'
            : resp.status === 400 ? 'no face detected in the photo(s)'
            : ('server returned HTTP ' + resp.status);
          setProgress(document.getElementById('progressEl').innerHTML +
            `<br><span class="skip">✗ Could not register face — ${reason}</span>`);
          log('ERROR: Could not register face — ' + reason);
        }
      } catch (e) {
        setProgress(document.getElementById('progressEl').innerHTML +
          `<br><span class="skip">✗ Could not reach the server: ${e.message}</span>`);
        log('ERROR: Could not reach the server: ' + e.message);
      }
    }

    // ─── Init ────────────────────────────────────────────────────────────
    init();
  </script>
</body>

</html>
