# Runs the two services as separate, independently-manageable containers on the
# same host and default network. The dashboard (smart-home) reaches the weather
# service (api-server) by its compose service name over Docker's internal DNS.
services:
  # Weather / HVAC micro-service. Internal only — no host port mapping, so it is
  # NOT reachable from outside the compose network, only by the sibling service.
  api-server:
    # Swapped out local build context for remote ECR registry pull.
    # Locally defaults to "smart-home-system", triggering a local image lookup.
    image: ${ECR_REGISTRY:-smart-home-system}/smart-home-system-api:latest
    # OPENWEATHER_API_KEY etc. come from climate-control/.env at runtime (not
    # baked into the image). Fails fast on startup if the key is missing.
    env_file:
      - ./climate-control/.env
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 48M
    restart: unless-stopped

  # Public dashboard. The only service exposed to the host.
  smart-home:
    # ECR_REGISTRY is set in CI/production (GitHub Actions secret).
    # Locally it defaults to "smart-home-system", triggering a local build.
    image: ${ECR_REGISTRY:-smart-home-system}/smart-home-system:latest
    ports:
      - "8000:8000"
    environment:
      # Resolves to the api-server container via compose's internal DNS.
      # Mark the session cookie Secure (HTTPS-only). Browsers still accept
      # Secure cookies on http://localhost, so local docker testing keeps working.
      - API_SERVER_HOST=api-server
      - SECURE_COOKIES=true
      # The only origin allowed for credentialed cross-origin API calls.
      - CORS_ORIGIN=https://smart-home-system-url.duckdns.org
    depends_on:
      - api-server
    # Persist SQLite DB + logs across restarts/redeploys (matches Dockerfile VOLUME).
    volumes:
      - smarthome-data:/app/data
      # Live static files — overrides the image's baked-in copy so index.html
      # edits show up without a rebuild. Read-only; server never writes here.
      - ./static:/app/static:ro
      # Face embeddings, read-only — the container only ever reads embeddings.json.
      # embeddings.json is gitignored, so in production the git clone's face-data/
      # is EMPTY — the deploy script exports FACE_DATA_HOST_PATH=/mnt/face-data
      # (the EBS mount where embeddings.json is scp'd). Local dev keeps ./face-data.
      - ${FACE_DATA_HOST_PATH:-./face-data}:/app/face-data:ro
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    restart: unless-stopped

volumes:
  smarthome-data:
