# ─────────────────────────────────────────────────────────────────
# Base compose file — LOCAL DEVELOPMENT
# ─────────────────────────────────────────────────────────────────
# Just run:  docker compose up -d
# Both services build from local source. No registry access needed.
# For production, layer the prod override on top:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────
services:
  # Weather / HVAC micro-service. Internal only — no host port mapping, so it is
  # NOT reachable from outside the compose network, only by the sibling service.
  api-server:
    # Always builds from the climate-control subdirectory, in every environment.
    build:
      context: .
      dockerfile: climate-control/Dockerfile
    # OPENWEATHER_API_KEY etc. come from climate-control/.env at runtime (not
    # baked into the image). Fails fast on startup if the key is missing.
    env_file:
      - ./climate-control/.env
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 48M
    restart: unless-stopped

  # Public dashboard. The only service exposed to the host.
  smart-home:
    # Locally: build from the repo root Dockerfile.
    # Production: overridden to pull from ECR via docker-compose.prod.yml.
    build: .
    ports:
      - "8000:8000"
    environment:
      # Resolves to the api-server container via compose's internal DNS.
      # Mark the session cookie Secure (HTTPS-only). Browsers still accept
      # Secure cookies on http://localhost, so local docker testing keeps working.
      - API_SERVER_HOST=api-server
      - SECURE_COOKIES=true
      # The only origin allowed for credentialed cross-origin API calls.
      - CORS_ORIGIN=https://smart-home-system-url.duckdns.org
    depends_on:
      - api-server
    # Persist SQLite DB + logs across restarts/redeploys (matches Dockerfile VOLUME).
    volumes:
      - smarthome-data:/app/data
      # Live static files — overrides the image's baked-in copy so index.html
      # edits show up without a rebuild. Read-only; server never writes here.
      - ./static:/app/static:ro
      # Face embeddings — named volume (writable) so face enrollment via
      # POST /api/face-embeddings can persist embeddings.json across redeploys.
      - face-data:/app/face-data
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    restart: unless-stopped

volumes:
  smarthome-data:
  face-data:
